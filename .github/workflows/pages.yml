name: Deploy brand guide to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Export the interactive guide to a PDF (one page per plate) so the
      # deployed site serves the brand-guide.pdf that the repo docs link to.
      # The npm artifacts are removed afterwards so they stay out of the
      # uploaded Pages artifact.
      - name: Export brand-guide.pdf
        run: |
          npm i puppeteer
          node -e "
            const puppeteer = require('puppeteer');
            (async () => {
              const b = await puppeteer.launch({ args: ['--no-sandbox'] });
              const p = await b.newPage();
              await p.goto('file://' + process.cwd() + '/site/index.html', { waitUntil: 'networkidle0' });
              await p.pdf({ path: 'brand-guide.pdf', printBackground: true, preferCSSPageSize: true });
              await b.close();
            })();
          "
          test -s brand-guide.pdf
          rm -rf node_modules package.json package-lock.json

      - name: Root redirect → site/
        run: |
          cat > index.html <<'HTML'
          <!doctype html><meta charset=utf-8>
          <title>PROTEUS Visual Language</title>
          <meta http-equiv="refresh" content="0; url=./site/">
          <link rel="canonical" href="./site/">
          <a href="./site/">PROTEUS Visual Language →</a>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
