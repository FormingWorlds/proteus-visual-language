name: Release packages

# Tag a version (CalVer, YY.MM.DD) to publish the npm tokens package and
# the proteus-mpl PyPI package. Configure the secrets / trusted publishing
# noted below before the first release.

on:
  push:
    tags: ["[0-9][0-9].[0-9][0-9].[0-9][0-9]"]

jobs:
  npm-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish @formingworlds/proteus-tokens
        working-directory: tokens
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-proteus-mpl:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI Trusted Publishing (no token needed once configured)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        working-directory: figures/proteus-mpl
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: figures/proteus-mpl/dist
